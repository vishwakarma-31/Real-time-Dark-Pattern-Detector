# FIXED: BROKEN_4 — full CI/CD pipeline: test → build → push → SSH deploy
name: Deploy DarkScan

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install backend deps
        run: cd backend && npm install
      - name: Install dashboard deps
        run: cd dashboard && npm install
      - name: Build dashboard
        run: cd dashboard && npm run build

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/darkscan:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/darkscan
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/darkscan:latest
            docker-compose down
            docker-compose up -d
            sleep 8
            curl -f http://localhost:5000/api/v1/health || exit 1
            echo 'Deploy successful'
